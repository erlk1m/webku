# yaml-language-server: $schema=https://json-schema.org/draft-07/schema
# =============================================================================
# Konfigurasi Situs
# =============================================================================
# File ini berisi semua konfigurasi spesifik situs.
# Ubah file ini untuk menyesuaikan blog Anda.
# Setelah perubahan, build ulang situs: docker compose up -d --build
# =============================================================================

# =============================================================================
# Informasi Dasar Situs
# =============================================================================
site:
  title: 埃尔金 博主 # Nama situs
  alternate: erlk1m # Nama bahasa Inggris situs, digunakan di footer, Logo, @ handle, dll
  subtitle: Catatan sehari-hari # Subjudul situs
  name: k1m # Nama penulis - silakan ubah dengan nama Anda
  description: Blog pribadi berbasis Astro # Deskripsi situs
  avatar: /img/avatar.webp # Avatar situs
  showLogo: true # Tampilkan Logo
  author: Erlk1m # Nama penulis - silakan ubah dengan nama Anda
  url: https://armbian.web.id # URL situs untuk RSS dan SEO
  defaultOgImage: /img/avatar.webp # Gambar Open Graph default
  startYear: 2024 # Tahun pembuatan situs
  timezone: Asia/Jakarta # Konfigurasi zona waktu (format IANA), untuk tampilan dan pemrosesan tanggal
  keywords: # Kata kunci SEO (global)
    - blog
    - Astro
    - teknologi
    - web
    # Silakan tambahkan kata kunci sesuai konten website Anda
  # breadcrumbHome: Beranda  # Nama tampilan beranda di navigasi breadcrumb (default: 'Beranda')
  # icp:                         # Nomor ICP (dapat dikustomisasi link-nya)
  #   text: "xxxxxxxxxx"
  #   link: "https://beian.miit.gov.cn/"
  # Aktifkan transliterasi slug (mengonversi karakter CJK ke pinyin/romaji)
  # Catatan: mengaktifkan ini akan merusak URL CJK yang sudah ada. Jalankan `pnpm save-slugs` terlebih dahulu untuk menyimpan slug lama ke frontmatter.link
  # enableSlugTransliteration: true

# =============================================================================
# Internasionalisasi (i18n)
# Konfigurasi i18n - Mengontrol dukungan multi bahasa
# =============================================================================
# defaultLocale: kode bahasa default (URL tanpa prefix)
# locales: daftar bahasa yang didukung
#   - code: kode bahasa (format singkat BCP 47, misal 'id', 'en', 'ja')
#   - label: nama tampilan bahasa (misal 'Indonesia', 'English')
# -----------------------------------------------------------------------------
i18n:
  defaultLocale: id
  locales:
    - code: id
      label: Indonesia
    - code: en
      label: English
      # enabled: false  # Konten ada tapi dinonaktifkan sementara (konten tetap ada tapi rute tidak dihasilkan)
    - code: zh
      label: 中文
    - code: ja
      label: 日本語

# =============================================================================
# Peta Kategori
# Memetakan nama kategori ke slug URL yang ramah
# Contoh: URL kategori 'Catatan' menjadi /categories/note
# =============================================================================
categoryMap: # Kategori utama
  随笔: life        # Kehidupan
  笔记: note        # Catatan
  工具: tools       # Alat
  周刊: weekly      # Mingguan
  # Kategori sekunder
  前端: front-end   # Frontend
  # Kategori blog
  AI: ai
  armbian: armbian
  tutorial: tutorial
  rust: rust
  pengetahuan: pengetahuan

# =============================================================================
# Kategori Pilihan (Beranda)
# Kategori pilihan beranda - Ditampilkan sebagai kartu di halaman beranda
# =============================================================================
# Penjelasan field:
#   link: jalur tautan kategori, sesuai dengan slug di categoryMap
#   label: nama kategori yang ditampilkan di kartu
#   image: jalur gambar sampul (relatif terhadap direktori public)
#   description: teks deskripsi kategori, ditampilkan di kartu
# -----------------------------------------------------------------------------
featuredCategories:
  - link: life
    label: 随笔
    image: /img/cover/2.webp
    description: Catatan kehidupan, curhat sehari-hari
  - link: note
    label: 笔记
    image: /img/cover/4.webp
    description: Catatan teknologi, catatan belajar
  - link: note/front-end
    label: 前端
    image: /img/cover/1.webp
    description: Terkait teknologi frontend
  - link: tools
    label: 工具
    image: /img/cover/11.webp
    description: Penggunaan alat, peningkatan produktivitas

# =============================================================================
# Seri Pilihan
# Fitur seri pilihan - Untuk menampilkan konten seri yang diperbarui secara berkala (mendukung beberapa seri)
# =============================================================================
# Penjelasan field:
#   slug: jalur URL (wajib), misal 'weekly' untuk jalur /weekly
#         Catatan: tidak boleh bertentangan dengan rute cadangan, termasuk: about, categories, tags, friends, posts, archives, api, _astro, rss.xml, sitemap.xml, robots.txt, favicon.ico, dll
#   categoryName: nama kategori terkait (wajib, harus ada di categoryMap)
#   label: nama pendek yang ditampilkan di sidebar/navigasi (opsional)
#   fullName: nama lengkap yang ditampilkan di halaman seri (opsional)
#   description: teks perkenalan seri, mendukung Markdown multi baris (opsional)
#   cover: jalur gambar header halaman seri, relatif terhadap direktori public (opsional)
#   enabled: apakah seri ini aktif, setel false untuk menutup (opsional, default true)
#   icon: ikon navigasi, format Iconify seperti 'ri:newspaper-line' (opsional)
#   highlightOnHome: apakah menampilkan artikel terbaru secara menonjol di beranda (opsional, default true, setel false secara eksplisit untuk menonaktifkan)
#   links: konfigurasi tautan terkait (opsional)
# -----------------------------------------------------------------------------
featuredSeries:
  - slug: weekly # Jalur URL: /weekly
    categoryName: 周刊 # Harus cocok dengan nama kategori di categoryMap
    label: Mingguan # Nama pendek
    fullName: Mingguan Teknologi # Nama lengkap
    description: | # Mendukung Markdown multi baris
      Ini adalah contoh konfigurasi fitur seri/mingguan.
      Anda bisa menggunakannya untuk menerbitkan konten seri yang diperbarui secara berkala, seperti mingguan teknologi, catatan buku, dll.
      Setel enabled: false untuk menonaktifkan fitur ini.
    cover: /img/weekly_header.webp # Gambar header halaman seri
    enabled: false # Aktifkan seri ini
    icon: ri:newspaper-line # Ikon navigasi
    links: # Tautan terkait (opsional)
      github: https://github.com/erlk1m/webku # (opsional) Repositori GitHub
      rss: /rss.xml # (opsional) Tautan langganan RSS
      # chrome: https://chromewebstore.google.com/detail/id-ekstensi-kamu # (opsional) Ekstensi browser
      # docs: https://url-dokumentasi-kamu # (opsional) Tautan dokumentasi

# =============================================================================
# Tautan Sosial
# Tautan sosial - Ditampilkan di footer dan area informasi pribadi
# =============================================================================
# Penjelasan field:
#   url: alamat tautan (email perlu prefix mailto:)
#   icon: pengenal ikon Iconify, format "set:nama_ikon"
#         Pencarian ikon: https://icon-sets.iconify.design/ri/
#   color: (opsional) warna ikon, format heksadesimal seperti '#191717'
# -----------------------------------------------------------------------------
# Tambah platform baru: salin blok konfigurasi yang ada, ubah nama kunci dan nilai field-nya
# -----------------------------------------------------------------------------
social:
  github:
    url: https://github.com/erlk1m # Ganti dengan tautan GitHub Anda
    icon: ri:github-fill # Ikon Remix Icon untuk GitHub
    color: '#191717' # (opsional) warna ikon
  email:
    url: mailto:email@kamu.com # Ganti dengan email Anda, perlu prefix mailto:
    icon: ri:mail-line
    color: '#55acd5'
  rss:
    url: /rss.xml # Alamat langganan RSS situs
    icon: ri:rss-line
    color: '#ff6600'
  # -------------------------------------------------------------------------
  # Berikut contoh platform sosial opsional lainnya, hapus komentar dan ubah untuk mengaktifkan:
  # -------------------------------------------------------------------------
  # twitter:
  #   url: https://x.com/handle-kamu
  #   icon: ri:twitter-fill
  #   color: '#4b9ae4'
  # bilibili:
  #   url: https://space.bilibili.com/id-kamu
  #   icon: ri:bilibili-fill
  #   color: '#da708a'

# =============================================================================
# Tautan Pertemanan
# Konfigurasi halaman tautan pertemanan - Menampilkan daftar tautan teman dan petunjuk pengajuan
# =============================================================================
# intro: konfigurasi teks perkenalan halaman
#   title: judul halaman
#   subtitle: subjudul halaman
#   applyTitle: judul blok pengajuan
#   applyDesc: teks petunjuk pengajuan
#   exampleYaml: contoh format pengajuan (format YAML)
# data: array daftar tautan teman
#   - site: nama situs
#   - url: alamat situs
#   - owner: nama panggilan pemilik
#   - desc: deskripsi/singkat situs
#   - image: URL gambar avatar
#   - color: (opsional) warna latar kartu, format heksadesimal
# -----------------------------------------------------------------------------
friends:
  intro:
    title: Tautan Pertemanan # Judul halaman
    subtitle: Mari bertukar tautan! # Subjudul halaman
    applyTitle: Ajukan Tautan # Judul blok pengajuan
    applyDesc: Silakan tinggalkan pesan di halaman ini dengan format berikut # Petunjuk pengajuan
    exampleYaml: | # Contoh format pengajuan, akan ditampilkan di halaman
      - site: Nama blog Anda # Nama situs
        url: https://blog-anda.com/ # Alamat situs
        owner: Nama Anda # Nama panggilan
        desc: Deskripsi singkat situs # Deskripsi situs
        image: https://blog-anda.com/avatar.jpg # Tautan avatar
        color: "#ffc0cb" # Warna tema (opsional)
  data: # Daftar tautan teman
    - site: Contoh Blog A
      url: https://example-a.com
      owner: Alice
      desc: Seorang developer yang mencintai teknologi
      image: https://api.dicebear.com/7.x/avataaars/svg?seed=Alice
      color: '#BEDCFF'
    - site: Contoh Blog B
      url: https://example-b.com
      owner: Bob
      desc: Situs berbagi kehidupan dan teknologi
      image: https://api.dicebear.com/7.x/avataaars/svg?seed=Bob
      color: '#FBC1CC'
    - site: Contoh Blog C
      url: https://example-c.com
      owner: Carol
      desc: Tempat mencatat pembelajaran dan pertumbuhan
      image: https://api.dicebear.com/7.x/avataaars/svg?seed=Carol
      color: '#ABDCFF'

# =============================================================================
# Pengumuman
# Sistem pengumuman - Menampilkan notifikasi penting di bagian atas halaman
# =============================================================================
# Penjelasan field:
#   id: pengenal unik, digunakan untuk mencatat status baca pengguna (localStorage)
#   title: judul pengumuman
#   content: teks isi pengumuman
#   type: tipe, mempengaruhi warna gaya (info/success/warning/error)
#   priority: angka prioritas, semakin besar semakin di atas
#   color: (opsional) warna kustom, menimpa warna default tipe
#   publishDate: tanggal terbit, format 'YYYY-MM-DD'
#   startDate: (opsional) waktu mulai tampil, format ISO 8601
#   endDate: (opsional) waktu berakhir, otomatis tersembunyi setelah kedaluwarsa
#   link: (opsional) tautan terkait
#     url: alamat tautan
#     text: teks tautan
#     external: buka di jendela baru (true/false)
# -----------------------------------------------------------------------------
# Hapus komentar di bawah untuk mengaktifkan contoh pengumuman:
# -----------------------------------------------------------------------------
announcements:
  # - id: selamat-tahun-2026 # Pengenal unik
  #   title: Selamat Tahun Baru 2026! # Judul pengumuman
  #   content: Selamat tahun baru! Terima kasih atas dukungan kalian~ # Isi pengumuman
  #   type: success # Tipe: info/success/warning/error
  #   priority: 10 # Prioritas, semakin besar semakin di atas
  #   color: '#FF6B6B' # (opsional) warna kustom
  #   publishDate: '2026-01-01' # Tanggal terbit
  #   startDate: '2025-12-31T00:00:00+07:00' # (opsional) waktu mulai tampil
  #   endDate: '2026-01-15T23:59:59+07:00' # (opsional) waktu berakhir
  #   link: # (opsional) tautan terkait
  #     url: https://example.com
  #     text: Pelajari lebih lanjut
  #     external: true # Buka di jendela baru

# =============================================================================
# Daftar Sampul Default
# Daftar sampul default - Saat artikel tidak menentukan sampul, akan dipilih acak dari daftar ini
# Tidak disetel akan menggunakan 21 sampul bawaan (/img/cover/1~21.webp)
# =============================================================================
# defaultCoverList:
#   - /img/cover/1.webp
#   - https://example.com/custom-cover.webp


# =============================================================================
# Opsi Pemrosesan Konten
# Opsi pemrosesan konten - Mengontrol perilaku rendering dan interaksi artikel
# =============================================================================
# Penjelasan field:
#   addBlankTarget: tautan eksternal buka di jendela baru
#   smoothScroll: aktifkan animasi gulir halus
#   addHeadingLevel: otomatis tambahkan anchor tingkat heading
#   enhanceCodeBlock: tingkatkan gaya blok kode (nomor baris, label bahasa, dll)
#   enableCodeCopy: tampilkan tombol salin blok kode
#   enableCodeFullscreen: tampilkan tombol layar penuh blok kode
#   enableLinkEmbed: aktifkan pratinjau kartu tautan (parsing info OG)
#   enableTweetEmbed: aktifkan tampilan sematan tweet
#   enableOGPreview: aktifkan kartu pratinjau Open Graph
#   previewCacheTime: waktu cache pratinjau (hari)
#   lazyLoadEmbeds: muat konten sematan secara lambat (tingkatkan performa)
#   postCardImagePosition: posisi gambar sampul kartu artikel (alternating/left/right)
# -----------------------------------------------------------------------------
content:
  addBlankTarget: true # Tautan eksternal buka di jendela baru
  smoothScroll: true # Gulir halus
  addHeadingLevel: # Anchor heading
  enhanceCodeBlock: true # Tingkatkan blok kode
  enableCodeCopy: true # Tombol salin kode
  enableCodeFullscreen: true # Tombol layar penuh kode
  enableLinkEmbed: true # Pratinjau kartu tautan
  enableCodePenEmbed: true # Sematan CodePen
  enableTweetEmbed: false # Sematan tweet
  enableOGPreview: true # Kartu pratinjau OG
  previewCacheTime: 30 # Waktu cache pratinjau (hari)
  lazyLoadEmbeds: true # Muat lambat sematan
  postCardImagePosition: alternating # Posisi gambar sampul kartu artikel di beranda alternating default bergantian left gambar sampul selalu di kiri right gambar sampul selalu di kanan
  # Fitur kompatibel Shoka (semua aktif secara default, setel false untuk menonaktifkan)
  enableShokaContainers: true   # :::blok peringatan ;;;tab label +++blok lipat
  enableShokaAttrs: true        # [teks]{.class} sintaks atribut
  enableShokaEffects: true      # ++garis bawah++ ==sorot== ~subskrip^ superskrip^
  enableShokaSpoiler: true      # !!teks tersembunyi!!
  enableShokaRuby: true         # {teks^bacaan} anotasi ruby
  enableShokaHexoTags: true     # {% links %} {% media %} Tag Hexo
  enableMath: true              # $rumus matematika$ Rendering KaTeX
  enableCodeMeta: true          # Peningkatan blok kode (title, mark, command)
  enableQuiz: true              # Fitur interaktif kuis
  enableEncryptedBlock: true    # :::encrypted{password="..."} blok konten terenkripsi

# =============================================================================
# Rute Navigasi
# Konfigurasi menu navigasi - Mendefinisikan item menu di bilah navigasi atas
# =============================================================================
# Penjelasan field:
#   name: nama tampilan item menu
#   path: jalur tautan (dapat diabaikan jika ada children, klik untuk membuka submenu)
#   icon: pengenal ikon Iconify, format "set:nama_ikon"
#   children: (opsional) daftar submenu, struktur sama dengan induk
# -----------------------------------------------------------------------------
# Referensi ikon:
#   - Font Awesome 6: https://icon-sets.iconify.design/fa6-solid/
#   - Remix Icon: https://icon-sets.iconify.design/ri/
# -----------------------------------------------------------------------------
navigation:
  - name: Beranda # Nama tampilan menu (teks fallback saat nameKey tidak ada)
    nameKey: nav.home # Kunci terjemahan i18n
    path: / # Jalur tautan
    icon: ri:home-heart-fill # Ikon
  # - name: Bacaan
  #   path: /reading
  - name: Mingguan
    nameKey: nav.weekly
    path: /weekly
    icon: ri:newspaper-line
  - name: Artikel # Saat ada submenu, path bisa diabaikan
    nameKey: nav.posts
    icon: ri:quill-pen-ai-fill
    children: # Daftar submenu
      - name: Kategori
        nameKey: nav.categories
        path: /categories
        icon: ri:grid-fill
      - name: Tag
        nameKey: nav.tags
        path: /tags
        icon: fa6-solid:tags
      - name: Arsip
        nameKey: nav.archives
        path: /archives
        icon: ri:archive-2-fill
  - name: Teman
    nameKey: nav.friends
    path: /friends
    icon: ri:links-line
  - name: Tentang
    nameKey: nav.about
    path: /about
    icon: fa6-regular:circle-user
  - name: Musik
    nameKey: nav.music
    path: /music
    icon: ri:music-2-fill

# =============================================================================
# Fitur Musiman/Natal
# Fitu dekorasi musiman/Natal - Efek visual khusus selama hari raya
# =============================================================================
# enabled: saklar utama, setel false untuk menutup semua efek hari raya
# features: saklar independen untuk setiap fitur
#   snowfall: efek animasi salju
#   christmasColorScheme: skema warna Natal
#   christmasCoverDecoration: dekorasi sampul Natal
#   christmasHat: tambahkan topi Natal ke avatar
#   readingTimeSnow: tampilkan ikon salju di samping waktu baca
# snowfall: parameter efek salju (mempengaruhi performa, disarankan kurangi untuk mobile)
#   speed: kecepatan jatuh (0-1), semakin besar semakin cepat
#   intensity: kepadatan salju (0-1), semakin besar semakin padat
#   mobileIntensity: kepadatan mobile, disarankan lebih rendah dari desktop
#   maxLayers: lapisan maksimum, mempengaruhi kedalaman 3D
#   maxIterations: iterasi maksimum, mempengaruhi jumlah kepingan salju
#   mobileMaxLayers: lapisan maksimum mobile
#   mobileMaxIterations: iterasi maksimum mobile


# =============================================================================
# Sistem Komentar
# =============================================================================
# provider: penyedia sistem komentar ('remark42' | 'giscus' | 'waline' | 'twikoo' | 'none')
#           setel 'none' atau tidak disetel untuk menonaktifkan sistem komentar
# -----------------------------------------------------------------------------
comment:
  provider: waline
  waline:
    serverURL: https://waline-comment-ten-omega.vercel.app  # ID lingkungan Twikoo (Tencent Cloud) atau alamat lingkungan Vercel (wajib)

# =============================================================================
# Analitik (Umami)
# =============================================================================
analytics:
  umami:
    enabled: true
    id: 249808c9-3e9d-4e17-9762-95ebce65dd0b
    endpoint: https://pageview-counter.erlkim.workers.dev

    statistics_display:
      token: "proxy"
      footer_site_stats: true
      article_page_views: true

# =============================================================================
# Konfigurasi SEO
# =============================================================================
seo:
  robots:
    # policy:                          # Strategi crawler (opsional, hapus komentar dan konfigurasi)
    #   - userAgent: '*'
    #     allow: '/'
    #     disallow:
    #       - '/api/'
    # host: true                       # Opsional: tambahkan perintah Host (Yandex)

