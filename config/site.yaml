# =============================================================================
# Bangumi (Pelacakan Media)
# Halaman anime - Komentari seluruh blok bangumi untuk menutup (halaman + navigasi otomatis tersembunyi)
# =============================================================================
bangumi:
  userId: cosine

# =============================================================================
# Alat Pengembangan (Hanya Dev)
# Konfigurasi alat pengembangan - Hanya berlaku di lingkungan pengembangan (pnpm dev)
# =============================================================================
dev:
  localProjectPath: '/Users/nama-kamu/path/ke/astro-koharu' # Silakan ubah ke jalur absolut proyek Anda
  contentRelativePath: 'src/content/blog'
  editors:
    - id: vscode
      name: VS Code
      icon: devicon-plain:vscode
      urlTemplate: 'vscode://file/{path}'
    - id: cursor
      name: Cursor
      icon: simple-icons:cursor
      urlTemplate: 'cursor://file/{path}'
    - id: zed
      name: Zed
      icon: simple-icons:zedindustries
      urlTemplate: 'zed://file/{path}'
