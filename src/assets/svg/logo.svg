<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" fill="none">
  <defs>
    <linearGradient id="sakura" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB7C5"/>
      <stop offset="50%" stop-color="#FF6B8A"/>
      <stop offset="100%" stop-color="#D63965"/>
    </linearGradient>
    <linearGradient id="petal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD6E0"/>
      <stop offset="100%" stop-color="#FF87A8"/>
    </linearGradient>
    <radialGradient id="petalCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF3366" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF3366" stop-opacity="0"/>
    </radialGradient>
    <style>
      @keyframes fall1 {
        0% { transform: translate(0, 0) rotate(0deg); opacity: 0.8; }
        25% { transform: translate(15px, 12px) rotate(45deg); opacity: 0.6; }
        50% { transform: translate(-5px, 25px) rotate(120deg); opacity: 0.5; }
        75% { transform: translate(20px, 38px) rotate(200deg); opacity: 0.3; }
        100% { transform: translate(5px, 55px) rotate(360deg); opacity: 0; }
      }
      @keyframes fall2 {
        0% { transform: translate(0, 0) rotate(0deg); opacity: 0.7; }
        25% { transform: translate(-10px, 10px) rotate(-30deg); opacity: 0.6; }
        50% { transform: translate(8px, 22px) rotate(-90deg); opacity: 0.45; }
        75% { transform: translate(-12px, 35px) rotate(-180deg); opacity: 0.25; }
        100% { transform: translate(-5px, 50px) rotate(-360deg); opacity: 0; }
      }
      @keyframes fall3 {
        0% { transform: translate(0, 0) rotate(20deg); opacity: 0.6; }
        20% { transform: translate(12px, 8px) rotate(60deg); opacity: 0.55; }
        40% { transform: translate(-8px, 18px) rotate(130deg); opacity: 0.4; }
        60% { transform: translate(18px, 28px) rotate(210deg); opacity: 0.3; }
        80% { transform: translate(-3px, 40px) rotate(290deg); opacity: 0.15; }
        100% { transform: translate(10px, 52px) rotate(360deg); opacity: 0; }
      }
      @keyframes sway {
        0%, 100% { transform: rotate(-3deg); }
        50% { transform: rotate(3deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.5; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.1); }
      }
      @keyframes shimmer {
        0% { opacity: 0.3; }
        50% { opacity: 0.9; }
        100% { opacity: 0.3; }
      }
      .fall1 { animation: fall1 4s ease-in-out infinite; }
      .fall2 { animation: fall2 5s ease-in-out infinite 0.8s; }
      .fall3 { animation: fall3 6s ease-in-out infinite 1.5s; }
      .fall4 { animation: fall1 5.5s ease-in-out infinite 2.2s; }
      .fall5 { animation: fall2 4.5s ease-in-out infinite 3s; }
      .fall6 { animation: fall3 5s ease-in-out infinite 0.5s; }
      .sway { animation: sway 3s ease-in-out infinite; transform-origin: center; }
      .pulse { animation: pulse 2.5s ease-in-out infinite; }
      .shimmer1 { animation: shimmer 3s ease-in-out infinite; }
      .shimmer2 { animation: shimmer 3s ease-in-out infinite 1s; }
    </style>
  </defs>

  <!-- Sakura 1 - kiri atas, jatuh -->
  <g class="fall1" transform="translate(15,2)">
    <ellipse cx="0" cy="-5" rx="3.5" ry="5.5" fill="url(#petal)"/>
    <ellipse cx="4.5" cy="-1.5" rx="3.5" ry="5.5" fill="url(#petal)" transform="rotate(72)"/>
    <ellipse cx="2.5" cy="4.5" rx="3.5" ry="5.5" fill="url(#petal)" transform="rotate(144)"/>
    <ellipse cx="-2.5" cy="4.5" rx="3.5" ry="5.5" fill="url(#petal)" transform="rotate(216)"/>
    <ellipse cx="-4.5" cy="-1.5" rx="3.5" ry="5.5" fill="url(#petal)" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="2" fill="url(#petalCenter)"/>
  </g>

  <!-- Sakura 2 - tengah, jatuh -->
  <g class="fall2" transform="translate(120,0)">
    <ellipse cx="0" cy="-4" rx="3" ry="5" fill="url(#petal)"/>
    <ellipse cx="3.8" cy="-1.2" rx="3" ry="5" fill="url(#petal)" transform="rotate(72)"/>
    <ellipse cx="2.2" cy="3.5" rx="3" ry="5" fill="url(#petal)" transform="rotate(144)"/>
    <ellipse cx="-2.2" cy="3.5" rx="3" ry="5" fill="url(#petal)" transform="rotate(216)"/>
    <ellipse cx="-3.8" cy="-1.2" rx="3" ry="5" fill="url(#petal)" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="1.8" fill="url(#petalCenter)"/>
  </g>

  <!-- Sakura 3 - kanan atas, jatuh -->
  <g class="fall3" transform="translate(240,5)">
    <ellipse cx="0" cy="-4.5" rx="3.2" ry="5.2" fill="url(#petal)"/>
    <ellipse cx="4" cy="-1.3" rx="3.2" ry="5.2" fill="url(#petal)" transform="rotate(72)"/>
    <ellipse cx="2.3" cy="4" rx="3.2" ry="5.2" fill="url(#petal)" transform="rotate(144)"/>
    <ellipse cx="-2.3" cy="4" rx="3.2" ry="5.2" fill="url(#petal)" transform="rotate(216)"/>
    <ellipse cx="-4" cy="-1.3" rx="3.2" ry="5.2" fill="url(#petal)" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="1.9" fill="url(#petalCenter)"/>
  </g>

  <!-- Sakura 4 - kanan tengah, jatuh -->
  <g class="fall4" transform="translate(260,20)">
    <ellipse cx="0" cy="-3" rx="2.5" ry="4.5" fill="url(#petal)"/>
    <ellipse cx="3.2" cy="-1" rx="2.5" ry="4.5" fill="url(#petal)" transform="rotate(72)"/>
    <ellipse cx="2" cy="3" rx="2.5" ry="4.5" fill="url(#petal)" transform="rotate(144)"/>
    <ellipse cx="-2" cy="3" rx="2.5" ry="4.5" fill="url(#petal)" transform="rotate(216)"/>
    <ellipse cx="-3.2" cy="-1" rx="2.5" ry="4.5" fill="url(#petal)" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="1.5" fill="url(#petalCenter)"/>
  </g>

  <!-- Sakura 5 - kiri bawah, jatuh -->
  <g class="fall5" transform="translate(5,15)">
    <ellipse cx="0" cy="-2.5" rx="2" ry="4" fill="url(#petal)"/>
    <ellipse cx="2.8" cy="-0.8" rx="2" ry="4" fill="url(#petal)" transform="rotate(72)"/>
    <ellipse cx="1.7" cy="2.5" rx="2" ry="4" fill="url(#petal)" transform="rotate(144)"/>
    <ellipse cx="-1.7" cy="2.5" rx="2" ry="4" fill="url(#petal)" transform="rotate(216)"/>
    <ellipse cx="-2.8" cy="-0.8" rx="2" ry="4" fill="url(#petal)" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="1.2" fill="url(#petalCenter)"/>
  </g>

  <!-- Sakura 6 - tengah bawah, jatuh -->
  <g class="fall6" transform="translate(160,10)">
    <ellipse cx="0" cy="-3" rx="2.2" ry="4.2" fill="url(#petal)" opacity="0.7"/>
    <ellipse cx="3" cy="-0.9" rx="2.2" ry="4.2" fill="url(#petal)" transform="rotate(72)" opacity="0.7"/>
    <ellipse cx="1.8" cy="2.8" rx="2.2" ry="4.2" fill="url(#petal)" transform="rotate(144)" opacity="0.7"/>
    <ellipse cx="-1.8" cy="2.8" rx="2.2" ry="4.2" fill="url(#petal)" transform="rotate(216)" opacity="0.7"/>
    <ellipse cx="-3" cy="-0.9" rx="2.2" ry="4.2" fill="url(#petal)" transform="rotate(288)" opacity="0.7"/>
    <circle cx="0" cy="0" r="1.3" fill="url(#petalCenter)"/>
  </g>

  <!-- Sakura statis kiri (bergoyang) -->
  <g class="sway" transform="translate(30,50)">
    <ellipse cx="0" cy="-4" rx="2.8" ry="4.8" fill="url(#petal)" opacity="0.5"/>
    <ellipse cx="3.5" cy="-1.2" rx="2.8" ry="4.8" fill="url(#petal)" transform="rotate(72)" opacity="0.5"/>
    <ellipse cx="2" cy="3.5" rx="2.8" ry="4.8" fill="url(#petal)" transform="rotate(144)" opacity="0.5"/>
    <ellipse cx="-2" cy="3.5" rx="2.8" ry="4.8" fill="url(#petal)" transform="rotate(216)" opacity="0.5"/>
    <ellipse cx="-3.5" cy="-1.2" rx="2.8" ry="4.8" fill="url(#petal)" transform="rotate(288)" opacity="0.5"/>
    <circle cx="0" cy="0" r="1.6" fill="url(#petalCenter)"/>
  </g>

  <!-- Main Text: Erlkim -->
  <text x="38" y="42" font-family="'Georgia', 'Times New Roman', serif" font-weight="bold" font-size="42" letter-spacing="1">
    <tspan fill="#2d2d2d">E</tspan><tspan fill="#2d2d2d">r</tspan><tspan fill="#2d2d2d">l</tspan><tspan fill="#2d2d2d">k</tspan><tspan fill="url(#sakura)">i</tspan><tspan fill="url(#sakura)">m</tspan>
  </text>

  <!-- Underline shimmer -->
  <rect class="shimmer1" x="38" y="48" width="60" height="3" rx="1.5" fill="url(#sakura)"/>
  <rect class="shimmer2" x="102" y="48" width="40" height="3" rx="1.5" fill="url(#sakura)" opacity="0.5"/>
</svg>
